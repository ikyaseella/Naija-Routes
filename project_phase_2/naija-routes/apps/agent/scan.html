<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Ticket — Naija Routes</title>
  <link rel="stylesheet" href="css/agent.css">
  <link rel="stylesheet" href="../../packages/shared/web/css/i18n.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="agent-info">
    <div class="agent-avatar">TU</div>
    <div>
      <div class="agent-name">Tunde Adeyemi</div>
      <div class="agent-park">📍 Jibowu Motor Park, Lagos</div>
    </div>
  </div>
  <div class="header-right">
    <div class="online-badge"><div class="online-dot"></div> <span data-i18n="agent.online">Online</span></div>
    <div class="header-time">09:42 AM</div>
  </div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs">
  <a href="index.html" class="nav-tab">📊 <span data-i18n="nav.dashboard">Dashboard</span></a>
  <a href="sell.html" class="nav-tab">🎫 <span data-i18n="nav.sell_ticket">Sell Ticket</span></a>
  <a href="scan.html" class="nav-tab active">📷 <span data-i18n="nav.scan_qr">Scan QR</span></a>
  <a href="#" class="nav-tab">🏢 <span data-i18n="nav.onboard">Onboard</span></a>
  <a href="reconcile.html" class="nav-tab">💰 <span data-i18n="nav.reconcile">Reconcile</span></a>
  <div class="nav-tab language-switcher" style="margin-left:auto">
    <select class="language-switcher__select" onchange="I18N.setLanguage(this.value)" style="background:transparent;color:inherit;border:1px solid rgba(255,255,255,0.3);padding:4px 8px;border-radius:4px;font-size:12px">
      <option value="en">English</option>
      <option value="yo">Yoruba</option>
      <option value="ha">Hausa</option>
      <option value="ig">Igbo</option>
      <option value="pcm">Pidgin</option>
    </select>
  </div>
</div>

<div class="main">
  <!-- SCANNER -->
  <div class="section-title" data-i18n="agent.scan_title">Board Passengers</div>
  <div class="scanner-section">
    <div style="font-size:16px;font-weight:700;margin-bottom:4px;" data-i18n="agent.scan_instruction">Scan Passenger QR Ticket</div>
    <div class="scanner-viewport">
      <div class="scanner-corner tl"></div>
      <div class="scanner-corner tr"></div>
      <div class="scanner-corner bl"></div>
      <div class="scanner-corner br"></div>
      <div class="scan-line"></div>
      <div id="reader" style="position:absolute; inset:0; z-index:1; opacity:0;"></div>
      <div style="font-size:11px;color:var(--muted);position:relative; z-index:2;" data-i18n="agent.camera_active">Camera active</div>
    </div>
    <div class="scan-hint" data-i18n="agent.scan_hint">Point camera at passenger's QR code</div>
    <button class="scan-manual-btn" data-i18n="agent.manual_entry">Enter reference manually</button>
  </div>
</div>

<script>window.__I18N_CONFIG__ = { localePath: '/__i18n/' }</script>
<script src="../../packages/shared/web/js/i18n.js"></script>
</body>
</html>
