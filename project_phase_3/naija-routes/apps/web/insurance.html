<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insurance — Naija Routes</title>
  <link rel="stylesheet" href="css/theme-deep-roots.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="/shared/css/i18n.css">
  <style>
    body { background: var(--color-slate-50); }
    .ins-layout { max-width: var(--max-width); margin: 0 auto; padding: var(--space-6) var(--space-6) var(--space-16); }
    .ins-tabs { display: flex; gap: var(--space-1); margin-bottom: var(--space-6); background: var(--color-white); border: 1px solid var(--color-slate-200); border-radius: var(--radius-xl); padding: var(--space-2); }
    .ins-tab { padding: var(--space-2) var(--space-5); border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: var(--weight-semibold); cursor: pointer; border: none; background: none; color: var(--color-slate-500); transition: var(--ease-fast); }
    .ins-tab:hover { color: var(--color-slate-900); }
    .ins-tab.active { background: var(--color-primary); color: var(--color-white); }
    .ins-panel { display: none; }
    .ins-panel.active { display: block; }
    .ins-provider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-bottom: var(--space-6); }
    .ins-provider-card { background: var(--color-white); border: 2px solid var(--color-slate-200); border-radius: var(--radius-xl); padding: var(--space-5); cursor: pointer; transition: var(--ease-fast); }
    .ins-provider-card:hover { border-color: var(--color-primary-l); }
    .ins-provider-card.selected { border-color: var(--color-primary); background: var(--color-primary-l); }
    .ins-provider-name { font-size: var(--text-lg); font-weight: var(--weight-bold); margin-bottom: 4px; }
    .ins-provider-rating { font-size: var(--text-sm); color: var(--color-gold); margin-bottom: var(--space-2); }
    .ins-provider-desc { font-size: var(--text-sm); color: var(--color-slate-600); line-height: 1.5; }
    .ins-plan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-6); }
    .ins-plan-card { background: var(--color-white); border: 2px solid var(--color-slate-200); border-radius: var(--radius-xl); padding: var(--space-5); cursor: pointer; transition: var(--ease-fast); position: relative; }
    .ins-plan-card:hover { border-color: var(--color-primary-l); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .ins-plan-card.selected { border-color: var(--color-primary); background: var(--color-primary-l); }
    .ins-plan-name { font-size: var(--text-lg); font-weight: var(--weight-bold); margin-bottom: var(--space-2); }
    .ins-plan-price { font-size: var(--text-2xl); font-weight: var(--weight-extrabold); color: var(--color-primary); margin-bottom: var(--space-3); }
    .ins-plan-coverage { list-style: none; padding: 0; margin: 0; font-size: var(--text-sm); color: var(--color-slate-600); }
    .ins-plan-coverage li { padding: 3px 0; display: flex; align-items: center; gap: var(--space-2); }
    .ins-plan-coverage li::before { content: '✓'; color: var(--color-primary); font-weight: 700; }
    .ins-plan-badge { position: absolute; top: -8px; right: 12px; background: var(--color-gold); color: #000; font-size: var(--text-xs); font-weight: var(--weight-bold); padding: 2px 10px; border-radius: 100px; }
    .ins-purchases, .ins-claims { background: var(--color-white); border: 1px solid var(--color-slate-200); border-radius: var(--radius-xl); overflow: hidden; }
    .ins-purch-header, .ins-claim-header { padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--color-slate-200); font-weight: var(--weight-bold); font-size: var(--text-sm); }
    .ins-item { padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--color-slate-100); display: grid; grid-template-columns: 1fr auto auto; gap: var(--space-4); align-items: center; font-size: var(--text-sm); }
    .ins-item:last-child { border-bottom: none; }
    .ins-claim-form { background: var(--color-white); border: 1px solid var(--color-slate-200); border-radius: var(--radius-xl); padding: var(--space-6); max-width: 500px; }
    .ins-success { display: none; background: var(--color-primary-l); border: 1px solid var(--color-primary); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); font-size: var(--text-sm); color: var(--color-primary); margin-bottom: var(--space-4); }
    .ins-error { display: none; background: var(--color-red-l); border: 1px solid var(--color-red); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); font-size: var(--text-sm); color: var(--color-red); margin-bottom: var(--space-4); }
    .ins-badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: var(--text-xs); font-weight: var(--weight-bold); }
    .ins-badge-active { background: var(--color-primary-l); color: var(--color-primary); }
    .ins-badge-pending { background: var(--color-gold-l); color: var(--color-gold-d); }
    .ins-badge-approved { background: var(--color-primary-l); color: var(--color-primary); }
    .ins-badge-rejected { background: var(--color-red-l); color: var(--color-red); }
    .ins-loading { text-align: center; padding: var(--space-12); color: var(--color-slate-400); }
    @media (max-width: 768px) { .ins-provider-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="design-label">🎨 Naija Routes · Travel Insurance</div>

  <nav>
    <a href="index.html" class="nav-logo" style="text-decoration:none;">🚌 <span data-i18n="nav.logo">NaijaRoutes</span></a>
    <div class="nav-links">
      <a href="index.html" data-i18n="nav.routes">Routes</a>
      <a href="cargo.html" data-i18n="nav.cargo">Cargo</a>
      <a href="corporate.html" data-i18n="nav.corporate">Corporate</a>
      <a href="tracking.html" data-i18n="nav.track_bus">Track Bus</a>
      <a href="ussd.html" data-i18n="nav.ussd">USSD</a>
      <a href="insurance.html" class="active" data-i18n="nav.insurance">Insurance</a>
      <a href="#" data-i18n="nav.help">Help</a>
      <div class="nav__item" data-i18n-language-container>
        <select class="language-switcher__select" onchange="I18N.setLanguage(this.value)">
          <option value="en">English</option>
          <option value="yo">Yoruba</option>
          <option value="ha">Hausa</option>
          <option value="ig">Igbo</option>
          <option value="pcm">Pidgin</option>
        </select>
      </div>
    </div>
    <button class="nav-cta" data-i18n="nav.sign_in">Sign in</button>
  </nav>

  <div id="insSuccess" class="ins-success"></div>
  <div id="insError" class="ins-error"></div>

  <div class="ins-layout">
    <h1 style="margin:0 0 var(--space-1);" data-i18n="insurance.title">Travel Insurance</h1>
    <p style="color:var(--color-slate-500);font-size:var(--text-sm);margin:0 0 var(--space-5);" data-i18n="insurance.subtitle">Protect your journey with AXA Mansard or Leadway Assurance</p>

    <div class="ins-tabs">
      <button class="ins-tab active" onclick="switchInsTab('plans')" data-i18n="insurance.plans_tab">Plans</button>
      <button class="ins-tab" onclick="switchInsTab('purchases')" data-i18n="insurance.my_policies">My Policies</button>
      <button class="ins-tab" onclick="switchInsTab('claims')" data-i18n="insurance.claims_tab">Claims</button>
      <button class="ins-tab" onclick="switchInsTab('file')" data-i18n="insurance.file_claim">File a Claim</button>
    </div>

    <div class="ins-panel active" id="panel-plans">
      <div class="ins-provider-grid" id="providerList"><div class="ins-loading" data-i18n="common.loading">Loading...</div></div>
      <div class="ins-plan-grid" id="planList"></div>
    </div>

    <div class="ins-panel" id="panel-purchases">
      <div id="purchasesList"><div class="ins-loading" data-i18n="common.loading">Loading...</div></div>
    </div>

    <div class="ins-panel" id="panel-claims">
      <div id="claimsList"><div class="ins-loading" data-i18n="common.loading">Loading...</div></div>
    </div>

    <div class="ins-panel" id="panel-file">
      <div class="ins-claim-form">
        <h3 style="margin:0 0 var(--space-4);" data-i18n="insurance.file_claim_title">File an Insurance Claim</h3>
        <form id="claimForm" onsubmit="submitClaim(event)">
          <div class="form-group" style="margin-bottom:var(--space-4);">
            <label class="form-label" data-i18n="insurance.claim_policy">Insurance Policy</label>
            <select id="claimPurchase" class="form-input" required><option value="">Select policy</option></select>
          </div>
          <div class="form-group" style="margin-bottom:var(--space-4);">
            <label class="form-label" data-i18n="insurance.claim_type">Claim Type</label>
            <select id="claimType" class="form-input" required>
              <option value="lost_baggage">Lost Baggage</option>
              <option value="medical">Medical Expenses</option>
              <option value="accident">Personal Accident</option>
              <option value="trip_delay">Trip Delay</option>
              <option value="trip_cancellation">Trip Cancellation</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:var(--space-4);">
            <label class="form-label" data-i18n="insurance.claim_amount">Claim Amount (₦)</label>
            <input type="number" id="claimAmount" class="form-input" min="1000" required>
          </div>
          <div class="form-group" style="margin-bottom:var(--space-4);">
            <label class="form-label" data-i18n="insurance.claim_description">Description</label>
            <textarea id="claimDesc" class="form-input" rows="3" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="insurance.submit_claim">Submit Claim</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const USER_ID = 'usr-emeka';
    let selectedProvider = null;

    function switchInsTab(name) {
      document.querySelectorAll('.ins-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.ins-panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.ins-tab[onclick*="${name}"]`).classList.add('active');
      document.getElementById(`panel-${name}`).classList.add('active');
      if (name === 'plans') loadPlans();
      if (name === 'purchases') loadPurchases();
      if (name === 'claims') loadClaims();
      if (name === 'file') loadClaimForm();
    }

    async function loadPlans() {
      const provEl = document.getElementById('providerList');
      const planEl = document.getElementById('planList');
      try {
        const res = await fetch('http://localhost:3000/api/v1/insurance/providers');
        const json = await res.json();
        const providers = json.data || [];
        provEl.innerHTML = providers.map(p => `
          <div class="ins-provider-card ${selectedProvider === p.id ? 'selected' : ''}" onclick="selectProvider('${p.id}')">
            <div class="ins-provider-name">${p.name}</div>
            <div class="ins-provider-rating">★ ${p.rating} · ${p.plans.length} plans</div>
            <div class="ins-provider-desc">${p.description}</div>
            <div style="font-size:var(--text-xs);color:var(--color-slate-400);margin-top:var(--space-2);">📞 ${p.contactPhone}</div>
          </div>
        `).join('');
        if (!selectedProvider && providers.length) selectedProvider = providers[0].id;
        renderPlans(providers);
      } catch (e) { provEl.innerHTML = '<p style="color:var(--color-red);">Failed to load providers.</p>'; }
    }

    function selectProvider(id) {
      selectedProvider = id;
      document.querySelectorAll('.ins-provider-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`.ins-provider-card[onclick*="${id}"]`)?.classList.add('selected');
      loadPlans();
    }

    function renderPlans(providers) {
      const el = document.getElementById('planList');
      const allPlans = providers.flatMap(p => (p.plans || []).map(pl => ({ ...pl, providerName: p.name })));
      if (!allPlans.length) { el.innerHTML = '<p style="color:var(--color-slate-400);">No plans available.</p>'; return; }
      el.innerHTML = allPlans.map(pl => `
        <div class="ins-plan-card" onclick="purchasePlan('${pl.id}')">
          <div class="ins-plan-name">${pl.providerName} — ${pl.name}</div>
          <div class="ins-plan-price">₦${(pl.priceKobo / 100).toLocaleString()}</div>
          <ul class="ins-plan-coverage">${pl.coverage.map(c => `<li>${c}</li>`).join('')}</ul>
          <div style="font-size:var(--text-xs);color:var(--color-slate-400);margin-top:var(--space-3);">Max payout: ₦${(pl.maxPayoutKobo / 100).toLocaleString()}</div>
        </div>
      `).join('');
    }

    async function purchasePlan(planId) {
      if (!confirm('Purchase this insurance plan?')) return;
      try {
        const res = await fetch('http://localhost:3000/api/v1/insurance/purchase', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: USER_ID, bookingId: `bk-${Date.now()}`, planId, passengerName: 'Emeka Okonkwo', travelDate: new Date().toISOString().split('T')[0], route: 'Lagos → Abuja' }),
        });
        const json = await res.json();
        if (json.success) {
          document.getElementById('insSuccess').textContent = `Policy purchased! Ref: ${json.data.id}`;
          document.getElementById('insSuccess').style.display = 'block';
          setTimeout(() => document.getElementById('insSuccess').style.display = 'none', 5000);
          loadPurchases();
        } else { showInsError(json.error); }
      } catch (e) { showInsError('Purchase failed.'); }
    }

    async function loadPurchases() {
      const el = document.getElementById('purchasesList');
      try {
        const res = await fetch(`http://localhost:3000/api/v1/insurance/purchases?userId=${USER_ID}`);
        const json = await res.json();
        const purchases = json.data || [];
        if (!purchases.length) { el.innerHTML = '<div style="padding:var(--space-8);text-align:center;color:var(--color-slate-400);">No insurance policies purchased yet.</div>'; return; }
        el.innerHTML = '<div class="ins-purchases">' + purchases.map(p => `
          <div class="ins-item">
            <div><strong>${p.plan?.providerName || p.providerId}</strong> — ${p.plan?.name || p.planId}<br><span style="color:var(--color-slate-400);font-size:var(--text-xs);">${p.route} · ${p.travelDate} · Ref: ${p.id}</span></div>
            <div style="font-weight:var(--weight-bold);">₦${(p.priceKobo / 100).toLocaleString()}</div>
            <div><span class="ins-badge ins-badge-active">${p.status}</span></div>
          </div>
        `).join('') + '</div>';
      } catch (e) { el.innerHTML = '<p style="color:var(--color-red);">Failed to load.</p>'; }
    }

    async function loadClaims() {
      const el = document.getElementById('claimsList');
      try {
        const res = await fetch(`http://localhost:3000/api/v1/insurance/claims?userId=${USER_ID}`);
        const json = await res.json();
        const claims = json.data || [];
        if (!claims.length) { el.innerHTML = '<div style="padding:var(--space-8);text-align:center;color:var(--color-slate-400);">No claims filed yet.</div>'; return; }
        el.innerHTML = '<div class="ins-claims">' + claims.map(c => {
          const badgeClass = c.status === 'approved' ? 'ins-badge-approved' : c.status === 'rejected' ? 'ins-badge-rejected' : 'ins-badge-pending';
          return `<div class="ins-item">
            <div><strong>${c.type.replace(/_/g, ' ')}</strong><br><span style="color:var(--color-slate-400);font-size:var(--text-xs);">${c.description?.substring(0, 60)}... · ${c.filedAt?.split('T')[0]}</span></div>
            <div style="font-weight:var(--weight-bold);">₦${(c.amountKobo / 100).toLocaleString()}</div>
            <div><span class="ins-badge ${badgeClass}">${c.status}</span></div>
          </div>`;
        }).join('') + '</div>';
      } catch (e) { el.innerHTML = '<p style="color:var(--color-red);">Failed to load.</p>'; }
    }

    async function loadClaimForm() {
      const sel = document.getElementById('claimPurchase');
      sel.innerHTML = '<option value="">Loading...</option>';
      try {
        const res = await fetch(`http://localhost:3000/api/v1/insurance/purchases?userId=${USER_ID}`);
        const json = await res.json();
        const purchases = json.data || [];
        sel.innerHTML = '<option value="">Select policy</option>' + purchases.map(p => `<option value="${p.id}">${p.id} — ${p.plan?.providerName || p.providerId} (${p.route})</option>`).join('');
      } catch (e) { sel.innerHTML = '<option value="">No policies found</option>'; }
    }

    async function submitClaim(e) {
      e.preventDefault();
      const body = {
        purchaseId: document.getElementById('claimPurchase').value,
        userId: USER_ID,
        type: document.getElementById('claimType').value,
        description: document.getElementById('claimDesc').value,
        amountKobo: parseInt(document.getElementById('claimAmount').value) * 100,
      };
      try {
        const res = await fetch('http://localhost:3000/api/v1/insurance/claims', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
        });
        const json = await res.json();
        if (json.success) {
          document.getElementById('insSuccess').textContent = `Claim filed! Ref: ${json.data.id}`;
          document.getElementById('insSuccess').style.display = 'block';
          document.getElementById('claimForm').reset();
          setTimeout(() => document.getElementById('insSuccess').style.display = 'none', 5000);
        } else { showInsError(json.error); }
      } catch (e) { showInsError('Failed to file claim.'); }
    }

    function showInsError(msg) {
      const el = document.getElementById('insError');
      el.textContent = msg; el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    loadPlans();
  </script>
  <script>window.__I18N_CONFIG__ = { localePath: '/shared/i18n/' }</script>
  <script src="/shared/js/i18n.js"></script>
</body>
</html>
