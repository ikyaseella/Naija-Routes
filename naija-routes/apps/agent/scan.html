<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Ticket — Naija Routes</title>
  <link rel="stylesheet" href="css/agent.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="agent-info">
    <div class="agent-avatar">TU</div>
    <div>
      <div class="agent-name">Tunde Adeyemi</div>
      <div class="agent-park">📍 Jibowu Motor Park, Lagos</div>
    </div>
  </div>
  <div class="header-right">
    <div class="online-badge"><div class="online-dot"></div> Online</div>
    <div class="header-time">09:42 AM</div>
  </div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs">
  <a href="index.html" class="nav-tab">📊 Dashboard</a>
  <a href="sell.html" class="nav-tab">🎫 Sell Ticket</a>
  <a href="scan.html" class="nav-tab active">📷 Scan QR</a>
  <a href="#" class="nav-tab">🏢 Onboard</a>
  <a href="reconcile.html" class="nav-tab">💰 Reconcile</a>
</div>

<div class="main">
  <!-- SCANNER -->
  <div class="section-title">Board Passengers</div>
  <div class="scanner-section">
    <div style="font-size:16px;font-weight:700;margin-bottom:4px;">Scan Passenger QR Ticket</div>
    <div class="scanner-viewport">
      <div class="scanner-corner tl"></div>
      <div class="scanner-corner tr"></div>
      <div class="scanner-corner bl"></div>
      <div class="scanner-corner br"></div>
      <div class="scan-line"></div>
      <div id="reader" style="position:absolute; inset:0; z-index:1; opacity:0;"></div>
      <div style="font-size:11px;color:var(--muted);position:relative; z-index:2;">Camera active</div>
    </div>
    <div class="scan-hint">Point camera at passenger's QR code</div>
    <button class="scan-manual-btn">Enter reference manually</button>
  </div>
</div>
</body>
</html>
