<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reconcile Cash — Naija Routes</title>
  <link rel="stylesheet" href="css/agent.css">
  <link rel="stylesheet" href="/shared/css/i18n.css">
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="agent-info">
    <div class="agent-avatar">TU</div>
    <div>
      <div class="agent-name">Tunde Adeyemi</div>
      <div class="agent-park">📍 Jibowu Motor Park, Lagos</div>
    </div>
  </div>
  <div class="header-right">
    <div class="online-badge"><div class="online-dot"></div> <span data-i18n="agent.online">Online</span></div>
    <div class="header-time">09:42 AM</div>
  </div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs">
  <a href="index.html" class="nav-tab">📊 <span data-i18n="nav.dashboard">Dashboard</span></a>
  <a href="sell.html" class="nav-tab">🎫 <span data-i18n="nav.sell_ticket">Sell Ticket</span></a>
  <a href="scan.html" class="nav-tab">📷 <span data-i18n="nav.scan_qr">Scan QR</span></a>
  <a href="#" class="nav-tab">🏢 <span data-i18n="nav.onboard">Onboard</span></a>
  <a href="reconcile.html" class="nav-tab active">💰 <span data-i18n="nav.reconcile">Reconcile</span></a>
  <div class="nav-tab language-switcher" style="margin-left:auto">
    <select class="language-switcher__select" onchange="I18N.setLanguage(this.value)">
      <option value="en">English</option>
      <option value="yo">Yoruba</option>
      <option value="ha">Hausa</option>
      <option value="ig">Igbo</option>
      <option value="pcm">Pidgin</option>
    </select>
  </div>
</div>

<div class="main">
  <!-- CASH TALLY -->
  <div class="section-title" data-i18n="agent.reconcile_title">End of Day Settlement</div>
  <div class="cash-strip" style="margin-bottom: 24px;">
    <div>
      <div class="cash-total-label" data-i18n="agent.total_cash_collected">Total Cash Collected Today</div>
      <div class="cash-total-val">₦185,500</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px;" data-i18n="agent.commission_earned">Commission earned: ₦9,275</div>
    </div>
    <button class="reconcile-btn" data-i18n="agent.reconcile_btn">💰 Reconcile Cash</button>
  </div>

  <div class="sell-form">
    <div class="form-title" data-i18n="agent.remittance_title">Bank Transfer Remittance</div>
    <div class="form-grid" style="grid-template-columns: 1fr;">
      <div class="form-field">
        <label data-i18n="agent.remittance_label">Amount Remitted to Head Office (₦)</label>
        <input type="text" value="176,225" style="font-family:'Space Mono',monospace;color:var(--gold);">
      </div>
      <div class="form-field">
        <label data-i18n="agent.transaction_ref">Transaction Reference ID</label>
        <input type="text" data-i18n-placeholder="agent.remittance_placeholder" placeholder="Paste bank transfer reference">
      </div>
    </div>
    <button class="issue-btn" style="background:var(--blue); border-color:var(--blue);" data-i18n="agent.submit_remittance">Submit Remittance Proof</button>
  </div>
</div>

<script>window.__I18N_CONFIG__ = { localePath: '/shared/i18n/' }</script>
<script src="/shared/js/i18n.js"></script>
</body>
</html>
