<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reconcile Cash — Naija Routes</title>
  <link rel="stylesheet" href="css/agent.css">
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="agent-info">
    <div class="agent-avatar">TU</div>
    <div>
      <div class="agent-name">Tunde Adeyemi</div>
      <div class="agent-park">📍 Jibowu Motor Park, Lagos</div>
    </div>
  </div>
  <div class="header-right">
    <div class="online-badge"><div class="online-dot"></div> Online</div>
    <div class="header-time">09:42 AM</div>
  </div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs">
  <a href="index.html" class="nav-tab">📊 Dashboard</a>
  <a href="sell.html" class="nav-tab">🎫 Sell Ticket</a>
  <a href="scan.html" class="nav-tab">📷 Scan QR</a>
  <a href="#" class="nav-tab">🏢 Onboard</a>
  <a href="reconcile.html" class="nav-tab active">💰 Reconcile</a>
</div>

<div class="main">
  <!-- CASH TALLY -->
  <div class="section-title">End of Day Settlement</div>
  <div class="cash-strip" style="margin-bottom: 24px;">
    <div>
      <div class="cash-total-label">Total Cash Collected Today</div>
      <div class="cash-total-val">₦185,500</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px;">Commission earned: ₦9,275</div>
    </div>
    <button class="reconcile-btn">💰 Reconcile Cash</button>
  </div>

  <div class="sell-form">
    <div class="form-title">Bank Transfer Remittance</div>
    <div class="form-grid" style="grid-template-columns: 1fr;">
      <div class="form-field">
        <label>Amount Remitted to Head Office (₦)</label>
        <input type="text" value="176,225" style="font-family:'Space Mono',monospace;color:var(--gold);">
      </div>
      <div class="form-field">
        <label>Transaction Reference ID</label>
        <input type="text" placeholder="Paste bank transfer reference">
      </div>
    </div>
    <button class="issue-btn" style="background:var(--blue); border-color:var(--blue);">Submit Remittance Proof</button>
  </div>
</div>
</body>
</html>
