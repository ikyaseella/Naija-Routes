<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search and compare bus routes across Nigeria. Find the best operators, prices and departure times on Naija Routes.">
  <title>Search Results — Naija Routes</title>
  <link rel="stylesheet" href="css/theme-deep-roots.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="/shared/css/i18n.css">
  
</head>
<body>

  <div class="design-label">🎨 <span data-i18n="home.design_label">Naija Routes · Traveller Web App · Design 1 — "Deep Roots"</span></div>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">🚌 <span data-i18n="nav.logo">NaijaRoutes</span></a>
    <div class="nav-links">
      <a href="#" data-i18n="nav.routes">Routes</a>
      <a href="cargo.html" data-i18n="nav.cargo">Cargo</a>
      <a href="corporate.html" data-i18n="nav.corporate">Corporate</a>
      <a href="tracking.html" data-i18n="nav.track_bus">Track Bus</a>
      <a href="ussd.html" data-i18n="nav.ussd">USSD</a>
      <a href="insurance.html" data-i18n="nav.insurance">Insurance</a>
      <a href="#" data-i18n="nav.help">Help</a>
      <div class="nav__item" data-i18n-language-container>
        <select class="language-switcher__select" onchange="I18N.setLanguage(this.value)">
          <option value="en">English</option>
          <option value="yo">Yoruba</option>
          <option value="ha">Hausa</option>
          <option value="ig">Igbo</option>
          <option value="pcm">Pidgin</option>
        </select>
      </div>
    </div>
    <button class="nav-cta" data-i18n="nav.sign_in">Sign in</button>
  </nav>

  <!-- Search Header -->
  <header class="search-header">
    <div class="container">
      <div class="search-summary">
        <div class="route-pill">
          <div>
            <h2 id="routeTitle">Lagos → Abuja</h2>
            <p id="routeMeta" data-i18n="search.loading">Loading...</p>
          </div>
        </div>
        <a href="index.html" class="btn btn-secondary btn-sm" data-i18n="search.modify_search">✏ Modify Search</a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="page-body">

    <!-- Sidebar Filters -->
    <aside>
      <div class="filter-sidebar">
        <div class="filter-heading" data-i18n="search.filter_results">Filter Results</div>

        <div class="filter-section">
          <div class="filter-label" data-i18n="search.departure_time">Departure Time</div>
          <label class="checkbox-label"><input type="checkbox" checked> <span data-i18n="search.time_morning">Morning (06:00–11:59)</span></label>
          <label class="checkbox-label"><input type="checkbox" checked> <span data-i18n="search.time_afternoon">Afternoon (12:00–17:59)</span></label>
          <label class="checkbox-label"><input type="checkbox"> <span data-i18n="search.time_evening">Evening (18:00–23:59)</span></label>
        </div>

        <div class="filter-section">
          <div class="filter-label" data-i18n="search.operators_filter">Operators</div>
          <label class="checkbox-label"><input type="checkbox" checked> ABC Transport</label>
          <label class="checkbox-label"><input type="checkbox" checked> GUO Transport</label>
          <label class="checkbox-label"><input type="checkbox" checked> Peace Mass Transit</label>
          <label class="checkbox-label"><input type="checkbox" checked> GIGM</label>
        </div>

        <div class="filter-section">
          <div class="filter-label" data-i18n="search.amenities">Amenities</div>
          <label class="checkbox-label"><input type="checkbox"> ❄️ <span data-i18n="search.amenity_ac">Air Conditioning</span></label>
          <label class="checkbox-label"><input type="checkbox"> 🔌 <span data-i18n="search.amenity_charging">Charging Ports</span></label>
          <label class="checkbox-label"><input type="checkbox"> 💺 <span data-i18n="search.amenity_legroom">Extra Legroom</span></label>
          <label class="checkbox-label"><input type="checkbox"> 🚻 <span data-i18n="search.amenity_toilet">Onboard Toilet</span></label>
        </div>

        <div class="filter-section">
          <div class="filter-label" data-i18n="search.max_price">Max Price</div>
          <input type="range" min="5000" max="30000" value="30000" style="width:100%; accent-color: var(--color-primary);">
          <div style="display:flex; justify-content:space-between; font-size: var(--text-xs); color: var(--color-slate-500); margin-top: 4px;">
            <span>₦5,000</span><span>₦30,000</span>
          </div>
        </div>
      </div>
    </aside>

    <main id="resultsContainer">
      <div class="results-header">
        <div class="results-count"><span id="resultCount">0</span> <span data-i18n="search.departures_found">departures found</span></div>
        <select class="sort-select" id="sortSelect" onchange="sortResults()">
          <option value="price" data-i18n="search.sort_cheapest">Sort: Cheapest first</option>
          <option value="departure" data-i18n="search.sort_earliest">Sort: Earliest first</option>
          <option value="rating" data-i18n="search.sort_highest_rated">Sort: Highest rated</option>
        </select>
      </div>
      <div id="resultsList"></div>
    </main>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const origin = params.get('origin') || 'Lagos';
    const destination = params.get('destination') || 'Abuja';
    const date = params.get('date') || new Date().toISOString().split('T')[0];
    const passengers = params.get('passengers') || '1';
    const BASE = '/api/v1';

    let currentResults = [];

    document.getElementById('routeTitle').textContent = `${origin} → ${destination}`;

    const d = new Date(date);
    const formatted = d.toLocaleDateString('en-NG', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    document.getElementById('routeMeta').textContent = `${formatted} · ${passengers} Passenger${passengers > 1 ? 's' : ''}`;

    function getOperatorInitials(name) {
      return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
    }

    function getOperatorColor(name) {
      const colors = [
        ['#FEF3C7','#B45309'], ['#DCFCE7','#166534'], ['#EDE9FE','#5B21B6'],
        ['#DBEAFE','#1E40AF'], ['#FCE7F3','#9D174D'], ['#E0F2FE','#0369A1'],
        ['#FEF9C3','#854D0E'], ['#F1F5F9','#334155'],
      ];
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return colors[Math.abs(hash) % colors.length];
    }

    function renderCards(results) {
      const list = document.getElementById('resultsList');
      if (!results.length) {
        list.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--color-slate-500);"><div style="font-size:48px;margin-bottom:16px;">🚌</div><div style="font-weight:700;font-size:var(--text-lg);margin-bottom:8px;">No routes found</div><div style="font-size:var(--text-sm);">Try a different origin or destination</div></div>';
        return;
      }

      currentResults = results;
      document.getElementById('resultCount').textContent = results.length;

      list.innerHTML = results.map(r => {
        const [bg, fg] = getOperatorColor(r.operator);
        const amountNaira = (r.priceKobo / 100).toLocaleString();
        const seatsLabel = r.seatsAvailable <= 3
          ? `<span class="seats-left">⚠ Only ${r.seatsAvailable} seats left!</span>`
          : `<span class="seats-ok">✔ ${r.seatsAvailable} seats left</span>`;
        const init = getOperatorInitials(r.operator);
        const bookingUrl = `booking.html?scheduleId=${r.id}&operator=${encodeURIComponent(r.operator)}&from=${encodeURIComponent(origin)}&to=${encodeURIComponent(destination)}&dep=${encodeURIComponent(r.departureTime)}&arr=${encodeURIComponent(r.arrivalTime)}&price=${r.priceKobo}&date=${date}`;

        return `
        <div class="operator-card">
          <div class="op-logo" style="background:${bg}; color:${fg};">${init}</div>
          <div class="op-details">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
              <div>
                <div class="op-name">${r.operator}</div>
                <div class="op-type">${r.vehicleType} · ${r.totalSeats} Seats</div>
              </div>
              <span class="badge badge-warning">★ ${r.rating} (312 ratings)</span>
            </div>
            <div class="time-row">
              <div class="time-block-inner">
                <div class="time-bold">${r.departureTime}</div>
                <div class="time-location">${origin}</div>
              </div>
              <div class="duration-line">
                <div class="duration-text">—</div>
                <div class="duration-bar"></div>
              </div>
              <div class="time-block-inner">
                <div class="time-bold">${r.arrivalTime}</div>
                <div class="time-location">${destination}</div>
              </div>
            </div>
            <div class="amenities">
              ${(r.amenities || []).map(a => `<span class="amenity-pill highlight">${a}</span>`).join('')}
              <span class="amenity-pill">Direct route</span>
            </div>
          </div>
          <div class="op-price-action">
            <div>
              <div class="price-main">₦${amountNaira}</div>
              <div class="price-per" data-i18n="search.per_person">per person</div>
            </div>
            ${seatsLabel}
            <button class="btn btn-primary" onclick="window.location.href='${bookingUrl}'" data-i18n="search.view_seats">
              View Seats
            </button>
          </div>
        </div>`;
      }).join('');
    }

    function sortResults() {
      const sort = document.getElementById('sortSelect').value;
      const sorted = [...currentResults];
      if (sort === 'price') sorted.sort((a, b) => a.priceKobo - b.priceKobo);
      else if (sort === 'departure') sorted.sort((a, b) => a.departureTime.localeCompare(b.departureTime));
      else if (sort === 'rating') sorted.sort((a, b) => b.rating - a.rating);
      renderCards(sorted);
    }

    async function loadResults() {
      try {
        const res = await fetch(`${BASE}/routes/search?origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&date=${date}&passengers=${passengers}`);
        const json = await res.json();
        if (json.success && json.data?.length) {
          renderCards(json.data);
        } else {
          renderCards([]);
          loadFallbackResults();
        }
      } catch {
        loadFallbackResults();
      }
    }

    function loadFallbackResults() {
      const mockResults = [
        { id: `sch-${Date.now()}-1`, operator: 'GUO Transport', departureTime: '06:30', arrivalTime: '17:00', priceKobo: 1250000, rating: 4.5, vehicleType: 'Toyota Hiace', seatsAvailable: 8, totalSeats: 14, amenities: ['AC', 'USB'] },
        { id: `sch-${Date.now()}-2`, operator: 'ABC Transport', departureTime: '07:00', arrivalTime: '18:30', priceKobo: 1100000, rating: 4.8, vehicleType: 'Sprinter Bus', seatsAvailable: 2, totalSeats: 15, amenities: ['AC'] },
        { id: `sch-${Date.now()}-3`, operator: 'Peace Mass Transit', departureTime: '12:00', arrivalTime: '00:00', priceKobo: 850000, rating: 4.2, vehicleType: 'Coaster Bus', seatsAvailable: 19, totalSeats: 28, amenities: [] },
      ];
      renderCards(mockResults);
    }

    loadResults();
  </script>
  <script>
  window.__I18N_CONFIG__ = { localePath: '/shared/i18n/' };
  </script>
  <script src="/shared/js/i18n.js"></script>
</body>
</html>
